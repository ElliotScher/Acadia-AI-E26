[project]
name = "acadia-ai-e26"
version = "0.1.0"
description = "Acadia AI E26 project"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "requests>=2.32.0",
    "python-dotenv>=1.0.0",
    "ultralytics>=8.0.0",
    "opencv-python>=4.0.0"
]
